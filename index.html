<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d1311">
    <title>Renewly Fit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #0d1311; 
            --glass: rgba(30, 30, 30, 0.4);
            --glass-border: rgba(255, 165, 0, 0.2);
            --orange-main: #ff9800;
            --orange-bright: #ffb74d;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --accent-gradient: linear-gradient(135deg, #ffb74d 0%, #ff9800 100%);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg-page); color: var(--text-main);
            font-family: 'Inter', sans-serif; margin: 0; 
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden;
        }

        /* ФОНОВЫЕ СФЕРЫ */
        .orb-wrapper { position: fixed; inset: 0; z-index: -1; filter: blur(70px); opacity: 0.7; }
        .orb { position: absolute; border-radius: 50%; animation: moveOrb 20s linear infinite; }
        .orb-1 { width: 450px; height: 450px; background: radial-gradient(circle, rgba(255,152,0,0.9) 0%, rgba(255,152,0,0) 70%); top: -15%; left: -15%; }
        .orb-2 { width: 550px; height: 550px; background: radial-gradient(circle, rgba(255,183,77,0.7) 0%, rgba(255,183,77,0) 70%); bottom: -15%; right: -15%; animation-delay: -5s; }
        @keyframes moveOrb { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(60px, 90px) scale(1.15); } }

        .app-container { width: 100%; max-width: 420px; padding: 20px 24px 130px; }
        header { text-align: center; margin: 35px 0; animation: fadeInUp 0.7s ease-out both; }
        .logo-img { width: 85px; height: 85px; object-fit: contain; filter: drop-shadow(0 0 15px rgba(255,152,0,0.6)); }
        h1 { font-size: 1.85rem; font-weight: 900; margin: 12px 0 0; letter-spacing: -1px; }
        h1 span { color: var(--orange-main); }

        .exercise-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            backdrop-filter: blur(25px); border-radius: 30px; padding: 22px; margin-bottom: 22px;
            animation: fadeInUp 0.5s ease-out both;
        }
        .ex-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .ex-title { font-weight: 800; font-size: 1.2rem; color: var(--orange-bright); }

        .history-item { display: flex; justify-content: space-between; padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.06); font-size: 0.95rem; }
        .history-item b { color: var(--orange-main); }

        .add-set-btn {
            background: rgba(255, 152, 0, 0.12); border: 1px dashed var(--orange-main);
            color: var(--orange-main); width: 100%; padding: 14px; border-radius: 18px;
            font-weight: 700; cursor: pointer; margin-top: 18px; transition: 0.3s ease;
        }
        .add-set-btn:active { background: rgba(255, 152, 0, 0.25); transform: scale(0.97); }

        .add-trigger {
            position: fixed; bottom: 35px; right: 35px; background: var(--accent-gradient); color: #000;
            width: 70px; height: 70px; border-radius: 24px; font-size: 38px; border: none; cursor: pointer; z-index: 100;
            display: flex; align-items: center; justify-content: center; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* КАСТОМНЫЕ МОДАЛКИ */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-window { 
            background: #141414; border-radius: 35px; padding: 30px; 
            width: 90%; max-width: 380px; border: 1px solid var(--glass-border);
            animation: fadeInUp 0.3s ease-out; text-align: center;
        }
        
        input {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 18px; color: #fff; padding: 18px; width: 100%; margin-bottom: 18px; outline: none;
        }

        .save-btn { background: var(--accent-gradient); color: #000; border: none; padding: 18px; border-radius: 18px; font-weight: 800; width: 100%; cursor: pointer; margin-bottom: 10px; }
        .cancel-btn { background: none; border: none; color: var(--text-dim); padding: 10px; cursor: pointer; font-weight: 600; width: 100%; }

        /* Кнопка удаления в модалке */
        .confirm-del-btn { background: #ff4444; color: #fff; border: none; padding: 18px; border-radius: 18px; font-weight: 800; width: 100%; cursor: pointer; margin-bottom: 10px; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="orb-wrapper"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

<div class="app-container">
    <header>
        <img src="logo.png" alt="R" class="logo-img">
        <h1>Renewly<span>Fit</span></h1>
    </header>
    <div id="exercise-list"></div>
</div>

<button class="add-trigger" onclick="toggleModal('ex-modal', true)">+</button>

<div class="modal-overlay" id="ex-modal" onclick="if(event.target==this) toggleModal('ex-modal', false)">
    <div class="modal-window">
        <h2 style="margin-top:0">Новое упражнение</h2>
        <input type="text" id="ex-name" placeholder="Напр: Жим штанги">
        <button class="save-btn" onclick="addExercise()">СОЗДАТЬ</button>
        <button class="cancel-btn" onclick="toggleModal('ex-modal', false)">ОТМЕНА</button>
    </div>
</div>

<div class="modal-overlay" id="set-modal" onclick="if(event.target==this) toggleModal('set-modal', false)">
    <div class="modal-window">
        <h2 style="margin-top:0">Записать подход</h2>
        <input type="number" id="set-weight" placeholder="Вес (кг)">
        <input type="number" id="set-reps" placeholder="Повторения">
        <button class="save-btn" onclick="saveSet()">СОХРАНИТЬ</button>
        <button class="cancel-btn" onclick="toggleModal('set-modal', false)">ОТМЕНА</button>
    </div>
</div>

<div class="modal-overlay" id="del-modal" onclick="if(event.target==this) toggleModal('del-modal', false)">
    <div class="modal-window">
        <div style="font-size: 50px; margin-bottom: 10px;">⚠️</div>
        <h2 style="margin-top:0">Удалить запись?</h2>
        <p style="color: var(--text-dim); margin-bottom: 25px;">Это действие нельзя будет отменить.</p>
        <button class="confirm-del-btn" id="confirm-del-action">УДАЛИТЬ</button>
        <button class="cancel-btn" onclick="toggleModal('del-modal', false)">ОСТАВИТЬ</button>
    </div>
</div>

<script>
    let exercises = JSON.parse(localStorage.getItem('renewly_fit_v2')) || [];
    let currentExId = null;
    let deleteTargetId = null;

    function toggleModal(id, show) {
        document.getElementById(id).style.display = show ? 'flex' : 'none';
    }

    function addExercise() {
        const name = document.getElementById('ex-name').value;
        if (name) {
            exercises.push({ id: Date.now(), name: name, history: [] });
            saveAndRender();
            toggleModal('ex-modal', false);
            document.getElementById('ex-name').value = '';
        }
    }

    function openSetModal(id) {
        currentExId = id;
        toggleModal('set-modal', true);
    }

    function saveSet() {
        const w = document.getElementById('set-weight').value;
        const r = document.getElementById('set-reps').value;
        const date = new Date().toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit'});

        if (w && r) {
            const ex = exercises.find(e => e.id === currentExId);
            ex.history.unshift({ weight: w, reps: r, date: date });
            if (ex.history.length > 5) ex.history.pop();
            saveAndRender();
            toggleModal('set-modal', false);
            document.getElementById('set-weight').value = '';
            document.getElementById('set-reps').value = '';
        }
    }

    // ВЫЗОВ КАСТОМНОЙ МОДАЛКИ УДАЛЕНИЯ
    function askDelete(id) {
        deleteTargetId = id;
        toggleModal('del-modal', true);
    }

    // САМО УДАЛЕНИЕ
    document.getElementById('confirm-del-action').onclick = function() {
        exercises = exercises.filter(e => e.id !== deleteTargetId);
        saveAndRender();
        toggleModal('del-modal', false);
    };

    function saveAndRender() {
        localStorage.setItem('renewly_fit_v2', JSON.stringify(exercises));
        render();
    }

    function render() {
        const list = document.getElementById('exercise-list');
        list.innerHTML = '';
        exercises.forEach((ex, i) => {
            const card = document.createElement('div');
            card.className = 'exercise-card';
            card.style.animationDelay = (i * 0.12) + 's';
            card.innerHTML = `
                <div class="ex-header">
                    <span class="ex-title">${ex.name}</span>
                    <button style="background:none; border:none; color:#ff4444; cursor:pointer; font-size: 1.2rem;" onclick="askDelete(${ex.id})">✕</button>
                </div>
                <div class="history-list">
                    ${ex.history.map(h => `
                        <div class="history-item">
                            <span>${h.date}</span>
                            <span><b>${h.weight} кг</b> × ${h.reps}</span>
                        </div>
                    `).join('')}
                    ${ex.history.length === 0 ? '<div style="text-align:center; opacity:0.3; padding:12px;">Нет записей</div>' : ''}
                </div>
                <button class="add-set-btn" onclick="openSetModal(${ex.id})">+ ДОБАВИТЬ ПОДХОД</button>
            `;
            list.appendChild(card);
        });
    }

    render();
</script>
</body>
</html>
